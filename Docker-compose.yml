services:
  node-app:
    build: ./
    ports:
      - "3000:3000"

  node-exporter:
    image: prom/node-exporter:latest
    # gives node-exporter visibility into all processes running on the host machine
    pid: host
    # Node Exporter reads host metrics by reading special Linux virtual filesystems
    # mounting them read-only (:ro) into the container so node-exporter can read them
    volumes:
      # CPU usage, memory, running processes, network stats
      - /proc:/host/proc:ro
      #  disk I/O, network interfaces, CPU topology, filesystem stats
      - /sys:/host/sys:ro
      # Mounts the entire host filesystem. Needed so node-exporter can calculate real disk usage across all mounted partitions on the host
      - /:/rootfs:ro
    # tell node-exporter where to find the mounted paths, since they're not at the default Linux locations inside the container
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"

  cron-job:
    build: ./cron

  pushgateway:
    image: prom/pushgateway:latest
    ports:
      - "9091:9091"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prom.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # - GF_SMTP_ENABLED=true
      # - GF_SMTP_HOST=******
      # - GF_SMTP_USER=******
      # - GF_SMTP_PASSWORD=******
      # - GF_SMTP_FROM_ADDRESS=******
      # - GF_SMTP_FROM_NAME=Grafana

volumes:
  prometheus_data:
  grafana_data:
